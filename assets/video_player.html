<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0F1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    padding: 10px;
  }
  .title {
    color: #C8A96E;
    font-size: 12px;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }
  video {
    width: 100%;
    max-width: 100%;
    border-radius: 10px;
    border: 1px solid #3D2E1A;
    background: #08090C;
    outline: none;
  }
</style>
</head>
<body>
  <p class="title">MechTek App Demo — 1 min</p>
  <video controls playsinline autoplay muted>
    <source src="demo.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</body>
</html>
